<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | HACK-X</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <nav id="nav">
      <div class="name">HACK-X</div>
      <ul id="ul">
        <li class="li"><a class="navlink" href="landing.html">Home</a></li>
        <li class="li"><a class="navlink" href="events.html">Hackathons</a></li>
        <li class="li"><a class="navlink" href="login.html">Login</a></li>
      </ul>
    </nav>

    <main class="wrap">
      <section class="panel">
        <h1 class="title">Login</h1>
        <p class="subtitle">Enter your details to continue.</p>

        <form id="loginForm" novalidate>
          <div class="grid">
            <div class="field full">
              <label for="loginEmail">Email</label>
              <input id="loginEmail" type="text" placeholder="name@example.com" />
            </div>

            <div class="field full">
              <label for="loginPass">Password</label>
              <input id="loginPass" type="password" placeholder="Minimum 6 characters" />
            </div>
          </div>

          <div class="actions">
            <button class="btn" id="loginBtn" type="button">Login</button>
            <a class="btn ghost" href="landing.html">Back</a>
          </div>
        </form>

        <hr class="sep" />

        <h2 class="title2">New here? Sign up</h2>
        <p class="subtitle">Create a basic account (stored in MySQL).</p>

        <form id="signupForm" novalidate>
          <div class="grid">
            <div class="field full">
              <label for="signupName">Name</label>
              <input id="signupName" type="text" placeholder="Your name" />
            </div>

            <div class="field full">
              <label for="signupEmail">Email</label>
              <input id="signupEmail" type="text" placeholder="name@example.com" />
            </div>

            <div class="field full">
              <label for="signupPass">Password</label>
              <input id="signupPass" type="password" placeholder="Minimum 6 characters" />
            </div>
          </div>

          <div class="actions">
            <button class="btn" id="signupBtn" type="button">Sign up</button>
          </div>
        </form>

        <p id="loginResult" class="result"></p>
      </section>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
